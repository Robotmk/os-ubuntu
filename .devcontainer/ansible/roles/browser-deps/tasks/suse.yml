---
- name: Install Chromium/Playwright system dependencies (SLES15 / SLE_BCI package names)
  community.general.zypper:
    name:
      - libasound2
      - libatk-bridge-2_0-0
      - libatk-1_0-0
      - libatspi0
      - libcairo2
      - libcups2
      - libdbus-1-3
      - libdrm2
      - libgbm1
      - libglib-2_0-0
      - mozilla-nspr
      - mozilla-nss
      - libpango-1_0-0
      - libX11-6
      - libxcb1
      - libXcomposite1
      - libXdamage1
      - libXext6
      - libXfixes3
      - libxkbcommon0
      - libXrandr2
      - libfontconfig1
      - libfreetype6
      # SLE_BCI ships NO fonts at all by default (not even a fallback) --
      # without at least one real font, Chromium/Skia hits a FATAL crash
      # (SkFontMgr_FontConfigInterface.cpp: "Not implemented", SIGABRT) the
      # moment it renders a real page with text, not just a warning. Found
      # via an actual RF suite run (Story 3.2), not anticipated by Story
      # 3.1's original research, which only checked the exact Debian-named
      # font packages (fonts-liberation etc.) and concluded "none available"
      # without checking whether ANY substitute font existed. dejavu-fonts
      # is broad-coverage and confirmed present in SLE_BCI.
      - dejavu-fonts
      - xorg-x11-fonts-core
    state: present
    update_cache: true

- name: Record SLE_BCI's remaining font/Xvfb gaps as a caveat, not a silent gap
  ansible.builtin.set_fact:
    install_report_caveats:
      browser-deps:
        - >-
          SLE_BCI (the free SLES base image) does not provide Xvfb or the
          exact Liberation/Noto-Color-Emoji/Unifont/scalable-X font packages
          available on Debian/Ubuntu. dejavu-fonts and xorg-x11-fonts-core
          are installed as broad-coverage substitutes -- without at least one
          real font, Chromium fatally crashes on any page with real text
          (SLE_BCI ships zero fonts by default), so this is not optional.
          Headless Chromium does not require Xvfb to launch. Pages relying
          specifically on color emoji or CJK/Unifont-level Unicode coverage
          may still render with fallback glyphs. A subscribed SLES image
          with the Package Hub/Desktop module could add the exact upstream
          packages; the free BCI image cannot.
